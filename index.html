<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Asset Manager - Internal System</title>
    <style>
        :root {
            --primary-color: #47C1CC; /* 沿用你之前设计的色号 */
            --accent-color: #FFC97A;
            --bg-color: #0f172a;
        }
        body {
            font-family: -apple-system, system-ui, sans-serif;
            background-color: var(--bg-color);
            color: #f1f5f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            border: 1px solid #334155;
            padding: 3rem;
            border-radius: 12px;
            background: rgba(30, 41, 59, 0.5);
            backdrop-filter: blur(10px);
        }
        h1 {
            color: var(--primary-color);
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
        }
        p {
            color: #94a3b8;
            margin-bottom: 2rem;
        }
        .links {
            display: flex;
            gap: 20px;
            justify-content: center;
        }
        a {
            color: var(--accent-color);
            text-decoration: none;
            font-size: 0.9rem;
            border: 1px solid var(--accent-color);
            padding: 8px 16px;
            border-radius: 6px;
            transition: all 0.3s;
        }
        a:hover {
            background: var(--accent-color);
            color: var(--bg-color);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Video Asset Manager</h1>
        <p>Internal Content Distribution & TikTok API Integration System</p>
        <div class="links">
            <a href="privacy.html">Privacy Policy</a>
            <a href="terms_of_service.html">Terms of Service</a>
        </div>
    </div>
</body>
</html>
